name: Deploy to GitHub Pages and E2E Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-and-test:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # In our case, the frontend is already inside the 'www' folder as static files.
      # If there was a build step (like React/Vue), it would go here.
      - name: Prepare build artifacts (if applicable)
        run: |
          if [ -f "package.json" ]; then
            if jq -e '.scripts.build' package.json > /dev/null; then
              npm run build
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './www' # Deploying the static frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Wait for GitHub Pages Deployment
        run: |
          echo "Waiting for deployment to be available at ${{ steps.deployment.outputs.page_url }}..."
          # Simple polling mechanism to ensure page is up
          timeout 120 bash -c 'until curl -s -f ${{ steps.deployment.outputs.page_url }}; do sleep 5; done'
          echo "Deployment is live!"



      - name: Start Express Server in Background
        run: |
          node server.js &
          sleep 3 # Allow server to boot

      - name: Run Selenium Tests Against Live URL
        env:
          BASE_URL: ${{ steps.deployment.outputs.page_url }}?api=http://localhost:5000/api
          GITHUB_ACTIONS: true
        run: |
          # Run tests with Mocha (Selenium Manager automatically manages Chrome and ChromeDriver)
          npx mocha ./globalHooks.js ./selenium-tests/specs/web-e2e.spec.js --timeout 120000 --exit

      - name: Upload Test Reports Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Reports
          path: Test Results/

      - name: Publish Test Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Test Execution Summary not generated (Tests crashed early)" >> $GITHUB_STEP_SUMMARY
          fi
