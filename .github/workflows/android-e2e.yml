name: Android Appium E2E & Reports Host

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-test:
    runs-on: macos-13 # macos-13 has hardware acceleration for Android Emulator
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node dependencies
        run: npm install

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Install Appium & Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Start Appium Server
        run: |
          appium --log appium.log &
        # Appium runs in background

      - name: Run E2E Android Appium Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            export APK_PATH="${{ github.workspace }}/android/app/build/outputs/apk/debug/app-debug.apk"
            cd tests
            pytest test_suites/test_android_e2e.py || true

      - name: Structure Deployable Reports Folder
        if: always()
        run: |
          mkdir -p deploy-reports/reports/latest
          mkdir -p deploy-reports/reports/history/build-${{ github.run_number }}

          # Copy to latest
          cp -r "tests/Test Results/HTML/execution-report.html" deploy-reports/reports/latest/ 2>/dev/null || true
          cp -r "tests/Test Results/Summary/summary.md" deploy-reports/reports/latest/ 2>/dev/null || true
          cp -r "tests/Test Results/Screenshots" deploy-reports/reports/latest/ 2>/dev/null || true
          cp -r "tests/Test Results/Excel/Automation_Test_Report.xlsx" deploy-reports/reports/latest/ 2>/dev/null || true

          # Copy to build history
          cp -r "tests/Test Results/HTML/execution-report.html" deploy-reports/reports/history/build-${{ github.run_number }}/ 2>/dev/null || true
          cp -r "tests/Test Results/Summary/summary.md" deploy-reports/reports/history/build-${{ github.run_number }}/ 2>/dev/null || true
          cp -r "tests/Test Results/Screenshots" deploy-reports/reports/history/build-${{ github.run_number }}/ 2>/dev/null || true
          cp -r "tests/Test Results/Excel/Automation_Test_Report.xlsx" deploy-reports/reports/history/build-${{ github.run_number }}/ 2>/dev/null || true

      - name: Deploy Reports to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: deploy-reports
          clean: false # Do NOT clean (this keeps the main static website files intact)

      - name: Upload Local Run Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-E2E-Reports
          path: |
            tests/Test Results/Excel/Automation_Test_Report.xlsx
            tests/Test Results/HTML/execution-report.html
            tests/Test Results/Screenshots/

      - name: Publish Action Run Summary
        if: always()
        run: |
          # Create job summary directly
          echo "# Android Appium Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Build Number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "Execution Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Append details if summary.md exists
          if [ -f "tests/Test Results/Summary/summary.md" ]; then
            cat "tests/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Append Live Report URL
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Live Report URL" >> $GITHUB_STEP_SUMMARY
          echo "[View Live Execution Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/latest/execution-report.html)" >> $GITHUB_STEP_SUMMARY
